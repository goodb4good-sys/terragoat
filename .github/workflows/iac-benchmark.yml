name: IaC Scanner Data Collection

on:
  workflow_dispatch: 

jobs:
  benchmark-scanners:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout TerraGoat Code
        uses: actions/checkout@v4

      # 1. Bypass the wrapper: Install Checkov directly via Python and run it
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run Checkov Scanner directly
        run: |
          pip install checkov
          checkov -d . --soft-fail -o json > checkov-results.json

      # 2. Run Trivy and output to JSON
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config' 
          scan-ref: '.'
          exit-code: '0' 
          format: 'json'
          output: 'trivy-results.json'

      # 3. Run KICS and output to JSON
      - name: Run KICS Scanner
        uses: checkmarx/kics-github-action@v2.1.20
        with:
          path: .
          ignore_on_exit: results 
          output_path: .
          output_formats: 'json'

      # 4. Upload the files so you can download them!
      - name: Upload Benchmark Data
        uses: actions/upload-artifact@v4
        with:
          name: scanner-benchmark-results
          path: |
            checkov-results.json
            trivy-results.json
            results.json
