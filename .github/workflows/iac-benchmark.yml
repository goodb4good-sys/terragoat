name: IaC Scanner Feasibility Test

on:
  workflow_dispatch: 

jobs:
  benchmark-scanners:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout TerraGoat Code
        uses: actions/checkout@v4

      - name: Run Checkov Scanner
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          soft_fail: true 
          output_format: cli 

      # Pinned to the safe, post-hack version (0.35.0)
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config' 
          scan-ref: '.'
          exit-code: '0' 

      # Pinned to the emergency Checkmarx patch (v2.1.20)
      - name: Run KICS Scanner
        uses: checkmarx/kics-github-action@v2.1.20
        with:
          path: .
          ignore_on_exit: results
