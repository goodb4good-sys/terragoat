name: IaC Scanner Data Collection

on:
  workflow_dispatch: 

jobs:
  benchmark-scanners:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout TerraGoat Code
        uses: actions/checkout@v4

      # NEW: Create a dedicated, clean folder for our data
      - name: Create Results Directory
        run: mkdir benchmark-results

      # 1. Run Checkov and output directly into the folder
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run Checkov Scanner directly
        run: |
          pip install checkov
          checkov -d . --soft-fail -o json > benchmark-results/checkov-results.json

      # 2. Run Trivy and output directly into the folder
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config' 
          scan-ref: '.'
          exit-code: '0' 
          format: 'json'
          output: 'benchmark-results/trivy-results.json'

      # 3. Run KICS and output directly into the folder
      - name: Run KICS Scanner
        uses: checkmarx/kics-github-action@v2.1.20
        with:
          path: .
          ignore_on_exit: results 
          output_path: benchmark-results/
          output_formats: 'json'

      # 4. Upload the ENTIRE folder as one clean ZIP file
      - name: Upload Benchmark Data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scanner-benchmark-results
          path: benchmark-results/
